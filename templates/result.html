<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Result</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 100%; }
        img { max-width: 100%; border-radius: 8px; margin-bottom: 20px; }
        .result { font-size: 24px; font-weight: bold; margin-bottom: 5px; color: #333; }
        .confidence { color: #666; margin-bottom: 20px; }
        a { text-decoration: none; color: #007bff; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Analysis Complete</h2>
        
        <img src="{{ image_path }}" alt="Uploaded Image">
        
        <div class="result">Prediction: {{ prediction }}</div>
        <div class="confidence">Confidence: {{ confidence }}%</div>
        
        <a href="/">← Analyze another image</a>
    </div>
</body>
</html>
